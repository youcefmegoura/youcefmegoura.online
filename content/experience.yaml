- id: keutt
  company:
    fr: "Keutt (Startup)"
    en: "Keutt (Startup)"
  role:
    fr: "DevOps & Lead Tech"
    en: "DevOps & Tech Lead"
  type: "part-time"
  period:
    start: "2026-01"
    end: "2026-03"
  location: "Paris, France"
  short:
    fr: "Structuration complète de l'infrastructure d'une startup : CI/CD, conteneurisation, automatisation, supervision et déploiement sur VPS."
    en: "Built a startup's infrastructure from scratch: CI/CD, containerization, automation, monitoring, and deployment on VPS."
  detailed:
    fr: |
      Contexte : Participation à la structuration technique d'une startup disposant d'applications backend, frontend web et mobiles Flutter, mais sans infrastructure de déploiement ni processus industrialisés.
      Objectif : mettre en place une plateforme de delivery fiable, automatisée, économique et adaptée aux contraintes budgétaires d'une jeune entreprise.

      Missions :
      - Conception et mise en place d'une infrastructure complète sur VPS, en alternative au cloud public pour des raisons de coût.
      - Conteneurisation des différentes applications et services avec Docker.
      - Mise en place d'un reverse proxy et du routage applicatif avec Traefik.
      - Automatisation de la configuration serveur et des déploiements avec Ansible.
      - Mise en place de pipelines CI/CD pour compiler, versionner et générer automatiquement les images Docker.
      - Intégration d'une stratégie de release basée sur la sémantique de version et le trunk-based development.
      - Administration des environnements via Portainer, permettant aux développeurs d'installer et de gérer visuellement les versions souhaitées.
      - Déploiement et maintenance de services internes (Nextcloud, Kimai, Portainer, OpenProject, etc.) sous Docker.
      - Automatisation des mises à jour de sécurité, de la maintenance applicative et du cycle de vie des services.
      - Mise en place de sauvegardes automatisées vers S3 pour les données et services critiques.
      - Référent technique pour les équipes backend, frontend web et mobile.
      - Accompagnement et formation des développeurs aux bonnes pratiques de livraison et de déploiement.
    en: |
      Context: Contributed to the technical structuring of a startup with backend, web frontend, and Flutter mobile applications, but no deployment infrastructure or industrialized delivery process.
      Goal: build a reliable, automated, cost-efficient delivery platform adapted to the budget constraints of an early-stage company.

      Missions:
      - Designed and implemented a complete VPS-based infrastructure as a cost-effective alternative to public cloud services.
      - Containerized applications and internal services with Docker.
      - Set up reverse proxying and application routing with Traefik.
      - Automated server configuration and deployments with Ansible.
      - Built CI/CD pipelines to compile, version, and automatically generate Docker images.
      - Introduced a release strategy based on semantic versioning and trunk-based development.
      - Administered environments via Portainer, allowing developers to visually install and manage the desired versions.
      - Deployed and maintained internal services (Nextcloud, Kimai, Portainer, OpenProject, etc.) using Docker.
      - Automated security patching, service maintenance, and application lifecycle operations.
      - Implemented automated backups to S3 for critical services and data.
      - Acted as technical reference for backend, frontend web, and mobile teams.
      - Supported and trained developers on delivery and deployment best practices.
  environment:
    - Docker
    - Ansible
    - Terraform
    - Kops
    - Kubernetes
    - Traefik
    - Linux
    - GitHub Actions
    - Portainer
    - AWS
    - OpenProject

- id: lacroix
  company:
    fr: "Lacroix Groupe"
    en: "Lacroix Group"
  role:
    fr: "Développeur Backend Senior"
    en: "Senior Backend Developer"
  type: "full-time"
  period:
    start: "2023-07"
    end: "2025-11"
  location: "Rennes, France"
  short:
    fr: "Développement de LX Connect, plateforme IoT industrielle générique. Microservices Java/Kotlin, architecture événementielle, Kubernetes et CI/CD."
    en: "Development of LX Connect, a generic industrial IoT platform. Java/Kotlin microservices, event-driven architecture, Kubernetes, and CI/CD."
  detailed:
    fr: |
      Contexte : Contribution au développement et à l’évolution de LX Connect, une plateforme IoT dédiée à la supervision en temps réel d’équipements connectés pour des clients industriels multi-secteurs.
      L’équipe projet rassemblait une vingtaine de collaborateurs (backend, frontend, mobile, DevOps, QA et produit) autour d’une solution robuste, scalable et maintenable.

      Missions :
      - Conception, développement et maintenance de microservices et bibliothèques backend en Java 17 et Kotlin 2.x avec Spring Boot 3.
      - Développement de modules clés de la plateforme : BFF, RSql Library, Device Twin, Operation Manager.
      - Mise en place d’une architecture microservices orientée scalabilité, résilience et découplage fonctionnel.
      - Intégration de Keycloak pour centraliser l’authentification et la sécurisation des services.
      - Développement de fonctionnalités de pilotage d’équipements connectés via plusieurs protocoles : HTTP, LwM2M, MQTT et CoAP.
      - Implémentation d’une architecture orientée événements avec Kafka pour le traitement temps réel des flux métier.
      - Gestion des données applicatives avec PostgreSQL, JSONB et TimescaleDB pour les besoins spatio-temporels.
      - Mise en place de mécanismes de cache avec Redis afin d’optimiser les performances des services.
      - Application des principes TDD et rédaction de tests unitaires avec JUnit, Mockito et AssertJ.
      - Renforcement de la qualité logicielle via SonarQube, Trivy et BlackDuck.
      - Mise en place et maintenance de pipelines CI/CD avec GitLab CI.
      - Conteneurisation et déploiement des services avec Docker, Kubernetes, Helm et Helmfile.
      - Mise en place du monitoring et de l’observabilité avec OpenTelemetry et SigNoz.
      - Travail en environnement Agile avec suivi des activités via Jira.
    en: |
      Context: Contributed to the development and evolution of LX Connect, an IoT platform designed for real-time monitoring of connected equipment for industrial clients across multiple sectors.
      The project team included around twenty contributors across backend, frontend, mobile, DevOps, QA, and product, building a robust, scalable, and maintainable solution.

      Missions:
      - Designed, developed, and maintained backend microservices and libraries in Java 17 and Kotlin 2.x with Spring Boot 3.
      - Developed key platform modules: BFF, RSql Library, Device Twin, and Operation Manager.
      - Implemented a microservices architecture focused on scalability, resilience, and functional decoupling.
      - Integrated Keycloak to centralize authentication and service security.
      - Built device control features using multiple communication protocols: HTTP, LwM2M, MQTT, and CoAP.
      - Implemented an event-driven architecture with Kafka for real-time business flow processing.
      - Managed application data with PostgreSQL, JSONB, and TimescaleDB for spatio-temporal use cases.
      - Introduced Redis caching mechanisms to improve service performance.
      - Applied TDD principles and wrote unit tests with JUnit, Mockito, and AssertJ.
      - Improved software quality with SonarQube, Trivy, and BlackDuck.
      - Built and maintained CI/CD pipelines with GitLab CI.
      - Containerized and deployed services using Docker, Kubernetes, Helm, and Helmfile.
      - Set up monitoring and observability with OpenTelemetry and SigNoz.
      - Worked in an Agile environment and tracked delivery through Jira.
  environment:
    - Java 17
    - Kotlin 2.x
    - Spring Boot 3
    - Kafka
    - Keycloak
    - PostgreSQL
    - JSONB
    - TimescaleDB
    - Redis
    - Docker
    - Kubernetes
    - Helm
    - Helmfile
    - GitLab CI
    - OpenTelemetry
    - SigNoz
    - SonarQube
    - Trivy
    - BlackDuck
    - JUnit
    - Mockito
    - AssertJ

- id: audaxis
  company:
    fr: "Audaxis"
    en: "Audaxis"
  role:
    fr: "Ingénieur Full-Stack Java & DevOps"
    en: "Full-Stack Java Angular & DevOps Engineer"
  type: "full-time"
  period:
    start: "2020-11"
    end: "2023-06"
  location: "Paris, France"
  short:
    fr: "Évolution de développeur backend à Lead Tech/DevOps. Modernisation d'ERP legacy vers des architectures microservices et migration Docker Swarm vers Kubernetes."
    en: "Progressed from backend developer to Tech Lead/DevOps. Modernized legacy ERPs to microservices architectures and migrated Docker Swarm to Kubernetes."
  detailed:
    fr: |
      Contexte : Évolution progressive au sein d'un éditeur ERP/CRM, du support de niveau 3 (MCO) jusqu'au rôle de Lead Technique et DevOps pour des clients grands comptes (Yves Rocher, LePlombFrancais, Rail Europe, OSG).
      
      Missions :
      - Refonte et Migration : Migration de solutions monolithiques legacy (Java 5/6, Tapestry, Compiere) vers des architectures modernes (Spring Boot, Angular, JDK 17).
      - Bases de données : Pilotage de la migration complexe de bases de données d'Oracle vers PostgreSQL (Ora2PG, Orafce) et optimisation des requêtes.
      - Cloud & DevOps : Migration de l'infrastructure de Docker Swarm vers Kubernetes (Helm) sur AWS. Mise en place de pipelines GitLab CI/CD.
      - Conception Backend : Développement de nouvelles applications (ex: système de facturation électronique avec Spring Boot et RabbitMQ).
      - Leadership : Rôle de Lead Technique post-production, conduite d'entretiens de recrutement, onboarding et animation de formations techniques.
    en: |
      Context: Progressed within an ERP/CRM provider from L3 support to Tech Lead and DevOps roles, supporting major enterprise clients (Yves Rocher, LePlombFrancais, Rail Europe, OSG).
      
      Missions:
      - Architecture Modernization: Migrated legacy monolithic solutions (Java 5/6, Tapestry, Compiere) to modern architectures (Spring Boot, Angular, JDK 17).
      - Database Migration: Led complex database migrations from Oracle to PostgreSQL (Ora2PG, Orafce) and optimized SQL performance.
      - Cloud & DevOps: Migrated infrastructure from Docker Swarm to Kubernetes (Helm) on AWS. Built and maintained GitLab CI/CD pipelines.
      - Backend Engineering: Designed and built applications from scratch (e.g., e-invoicing system using Spring Boot and RabbitMQ).
      - Leadership: Acted as Tech Lead, conducted technical interviews, and mentored team members through technical training and onboarding.
  environment:
    - Java (8 to 17)
    - Spring Boot 2
    - Angular
    - PostgreSQL & Oracle (11g/12c)
    - Docker, Kubernetes & Helm
    - AWS
    - GitLab CI
    - RabbitMQ

