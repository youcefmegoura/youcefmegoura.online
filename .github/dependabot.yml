version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore(deps):'
      prefix-development: 'chore(deps-dev):'
      include: 'scope'
    allow:
      - dependency-type: 'all'
    ignore:
      - dependency-name: 'react'
        versions: ['19.x']

  # Enable version updates for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    labels:
      - 'github-actions'
      - 'automated'
    commit-message:
      prefix: 'ci:'