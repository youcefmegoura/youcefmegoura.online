version: 2
updates:
  # Enable version updates for npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    labels:
      - 'dependencies'
      - 'automated'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    allow:
      - dependency-type: 'all'
    ignore:
      - dependency-name: 'react'
        versions: ['19.x']

  # Enable version updates for GitHub Actions.
  # No `include: 'scope'` here — GitHub Actions identifiers (e.g. actions/checkout)
  # serve as the commit subject, making an extra scope redundant.
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '03:00'
    labels:
      - 'github-actions'
      - 'automated'
    commit-message:
      prefix: 'ci'