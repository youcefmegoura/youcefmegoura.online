name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  deployments: write
  id-token: write # Required for OIDC authentication

jobs:
  validation:
    name: '🛡️ Quality Guard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate Commit Messages
        uses: wagoid/commitlint-github-action@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install & Verify
        run: |
          npm ci
          npm audit --audit-level=moderate
          npm run lint

  build:
    needs: validation
    name: '🏗️ Build'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload Build Output
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: out/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: '🚀 Deploy on netlify'
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - name: Download Build Artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/

      - name: Deploy to Netlify
        uses: jsmrcaga/action-netlify-deploy@v2.4.0
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_DEPLOY_TO_PROD: true
          build_command: "echo 'Build already completed'"
          install_command: "echo 'Skipping install'"
          build_directory: out

  preview:
    needs: build
    runs-on: ubuntu-latest
    name: '👁️ Deploy Preview'
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: build-output
          path: out/

      - name: Deploy Preview to Netlify
        id: netlify
        uses: jsmrcaga/action-netlify-deploy@v2.4.0
        with:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_DEPLOY_TO_PROD: false
          build_command: "echo 'Build already completed'"
          install_command: "echo 'Skipping install'"
          build_directory: out
          deploy_alias: "pr-${{ github.event.pull_request.number }}"

      - name: Comment Preview URL on PR
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          number: ${{ github.event.pull_request.number }}
          header: preview-deploy
          message: |
            ### 🚀 Preview Deployment Ready
            | | |
            |---|---|
            | 🔗 Preview URL | ${{ env.NETLIFY_PREVIEW_URL }} |
            | 📦 Commit | `${{ github.event.pull_request.head.sha }}` |